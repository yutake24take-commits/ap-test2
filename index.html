<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./pwa-192x192.png" />
    <title>応用情報 午前・午後対策</title>

    <script>
      window.__errs = [];
      function showErr(msg) {
        window.__errs.push(String(msg));
        var el = document.getElementById("root");
        if (!el) return;
        el.style.userSelect = "text";
        el.innerHTML =
          '<div style="padding:16px;font:14px/1.7 sans-serif;color:#0f172a">' +
          '<b style="color:#e11d48">読み込みエラー</b><br>' +
          'この内容を伝えてください：<br><pre style="white-space:pre-wrap;background:#f1f5f9;padding:10px;border-radius:8px;margin-top:8px;font-size:12px">' +
          window.__errs.join("\n\n").replace(/</g, "&lt;") +
          "</pre></div>";
      }
      window.addEventListener("error", function (e) {
        showErr((e && e.message) || "error: " + (e.filename || ""));
      });
      window.addEventListener("unhandledrejection", function (e) {
        showErr("promise: " + ((e.reason && (e.reason.message || e.reason)) || e.reason));
      });
      try {
        if ("serviceWorker" in navigator)
          navigator.serviceWorker.getRegistrations().then(function (rs) {
            rs.forEach(function (r) { r.unregister(); });
          });
        if (window.caches) caches.keys().then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); });
      } catch (_) {}
      setTimeout(function () {
        var el = document.getElementById("root");
        if (el && el.getAttribute("data-mounted") !== "1" && window.__errs.length === 0) {
          showErr("6秒以内に表示されませんでした（部品の読み込みがブロックされている可能性）。");
        }
      }, 6000);
    </script>

    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom": "https://esm.sh/react-dom@18.3.1?external=react",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react",
          "lucide-react": "https://esm.sh/lucide-react@0.383.0?external=react,react-dom"
        }
      }
    </script>

    <style>
      html, body, #root { height: 100%; }
      body {
        margin: 0; background: #f1f5f9; -webkit-font-smoothing: antialiased;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN",
          "Hiragino Sans", Meiryo, "Noto Sans JP", sans-serif;
      }
      *:not(input):not(textarea) { -webkit-user-select: none; user-select: none; }
      input, textarea { -webkit-user-select: text; user-select: text; }
    </style>
  </head>
  <body>
    <div id="root"><div style="padding:24px;color:#94a3b8;font:14px sans-serif">読み込み中…</div></div>

    <script type="module">
      try {
        await import("./app.js");
        var el = document.getElementById("root");
        if (el) el.setAttribute("data-mounted", "1");
      } catch (err) {
        showErr("app.js: " + (err && (err.message || err)));
      }
    </script>
  </body>
</html>
